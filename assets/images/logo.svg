<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 120" role="img" aria-labelledby="title desc">
  <title id="title">Maison Essenza</title>
  <desc id="desc">Logotipo elegante com monograma ME</desc>
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8dfad"/>
      <stop offset=".48" stop-color="#c9a45f"/>
      <stop offset="1" stop-color="#fff2cb"/>
    </linearGradient>

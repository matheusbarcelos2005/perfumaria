    <text x="997" y="420" text-anchor="middle" font-family="Georgia, serif" font-size="23" fill="#f6d99c">NOIR</text>
  </g>
  <g filter="url(#shadow)">
    <path d="M76 540 L116 348 Q122 318 152 318 L180 318 Q210 318 216 348 L256 540 Z" fill="#f7efe1" stroke="#dfbd76" stroke-width="4"/>
    <rect x="125" y="275" width="82" height="58" rx="12" fill="#18191c" stroke="#dfbd76" stroke-width="3"/>
    <text x="166" y="430" text-anchor="middle" font-family="Georgia, serif" font-size="23" fill="#1a1713">MAINS</text>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 760" role="img" aria-labelledby="title desc">
  <title id="title">Vitrine de perfumes e cremes premium</title>
  <desc id="desc">Composicao de frascos de perfume, cremes e hidratantes sobre uma bancada de marmore escuro.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#171719"/>
      <stop offset=".5" stop-color="#2a2020"/>
      <stop offset="1" stop-color="#0d0e10"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1">
      <stop offset="0" stop-color="#f8dfad"/>
      <stop offset=".48" stop-color="#b78d45"/>
      <stop offset="1" stop-color="#fff4d1"/>
    </linearGradient>
    <linearGradient id="rose" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ffe2d6"/>
      <stop offset="1" stop-color="#b77973"/>
    </linearGradient>
    <linearGradient id="cream" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fff8e9"/>
      <stop offset="1" stop-color="#d6b980"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="28" stdDeviation="18" flood-color="#000" flood-opacity=".45"/>
    </filter>
  </defs>
  <rect width="1100" height="760" fill="url(#bg)"/>
  <path d="M0 560 C230 520 350 610 560 565 C755 523 885 500 1100 538 L1100 760 L0 760 Z" fill="#111215"/>
  <path d="M0 601 C250 565 430 650 650 600 C820 560 960 560 1100 586" fill="none" stroke="#ffffff" stroke-opacity=".08"/>
  <circle cx="880" cy="130" r="185" fill="#c9a45f" opacity=".08"/>
  <circle cx="240" cy="210" r="120" fill="#e8b7a8" opacity=".06"/>
  <g filter="url(#shadow)">
    <rect x="428" y="220" width="210" height="330" rx="26" fill="#141519" stroke="url(#gold)" stroke-width="5"/>
    <rect x="482" y="160" width="102" height="70" rx="12" fill="#0b0c0e" stroke="url(#gold)" stroke-width="4"/>
    <rect x="466" y="324" width="134" height="112" rx="4" fill="#fff7e8"/>
    <text x="533" y="377" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#151515">AUREA</text>
    <text x="533" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#a57b38" letter-spacing="4">EAU DE PARFUM</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="205" y="300" width="150" height="245" rx="22" fill="url(#rose)" stroke="#f4d3c8" stroke-width="4"/>
    <rect x="240" y="252" width="80" height="58" rx="10" fill="#171719" stroke="#f4d3c8" stroke-width="3"/>
    <rect x="232" y="380" width="96" height="78" rx="4" fill="#1b1718" opacity=".9"/>
    <text x="280" y="420" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#ffe7df">ROSE</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="690" y="330" width="185" height="210" rx="34" fill="url(#cream)" stroke="#f8dfad" stroke-width="4"/>
    <rect x="710" y="287" width="145" height="68" rx="28" fill="#201b19" stroke="#f8dfad" stroke-width="4"/>
    <text x="782" y="425" text-anchor="middle" font-family="Georgia, serif" font-size="26" fill="#2b211a">VELVET</text>
    <text x="782" y="454" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#806339" letter-spacing="3">BODY CREAM</text>
  </g>
  <g filter="url(#shadow)">
    <path d="M905 540 L952 292 Q957 266 982 266 L1012 266 Q1037 266 1042 292 L1089 540 Z" fill="#22252b" stroke="#d9b56e" stroke-width="4"/>

  <text x="72" y="680" font-family="Georgia, serif" font-size="36" fill="#fff7e8">rituais de fragrancia e cuidado</text>
  <text x="74" y="714" font-family="Arial, sans-serif" font-size="15" fill="#c9a45f" letter-spacing="5">PERFUMES · CREMES · HIDRATANTES</text>
